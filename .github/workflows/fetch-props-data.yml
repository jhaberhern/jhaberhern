name: Fetch props data

on:
  workflow_dispatch: {}
  schedule:
    # Tuesday 11:30 UTC — before the improvement/ledger run, so props
    # models always see the latest week during the season.
    - cron: "30 11 * * 2"

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r nfl-model/requirements.txt

      - name: Fetch and prune player data
        working-directory: nfl-model
        run: python props_fetch.py

      - name: Commit data cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nfl-model/data-cache
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Refresh props data cache"
            git push
          fi
