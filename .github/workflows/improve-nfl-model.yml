name: Improve NFL model

on:
  schedule:
    # Tuesday 12:00 UTC — after Monday Night Football, when the week's
    # results are all in the data.
    - cron: "0 12 * * 2"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  improve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r nfl-model/requirements.txt

      - name: Download fresh data
        working-directory: nfl-model
        run: python download_data.py

      - name: Run improvement tournament
        working-directory: nfl-model
        run: python improve.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nfl-model/champion.json nfl-model/history.csv nfl-model/RESULTS.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Weekly model improvement run"
            git push
          fi
